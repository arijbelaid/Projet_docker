<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Contacts</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="container">
        <h1>📇 Gestionnaire de Contacts</h1>
        
        <div class="form-container">
            <h2>Ajouter un contact</h2>
            <form id="contactForm">
                <input type="text" id="nom" placeholder="Nom" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="tel" id="telephone" placeholder="Téléphone" required>
                <button type="submit">Ajouter</button>
            </form>
        </div>

        <div class="contacts-container">
            <h2>Liste des contacts</h2>
            <div id="contactsList"></div>
        </div>
    </div>

    <!-- Modal de modification -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Modifier le contact</h2>
                <span class="close">&times;</span>
            </div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label for="editNom">Nom :</label>
                    <input type="text" id="editNom" required>
                </div>
                <div class="form-group">
                    <label for="editEmail">Email :</label>
                    <input type="email" id="editEmail" required>
                </div>
                <div class="form-group">
                    <label for="editTelephone">Téléphone :</label>
                    <input type="tel" id="editTelephone" required>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="btn-save">Enregistrer</button>
                    <button type="button" class="btn-cancel">Annuler</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
